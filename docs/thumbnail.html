<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0b0d12; --text:#f5f1e8; --text-2:#c7c0b4;
  --gold:#d8aa5a; --gold-light:#f0ce82; --blue:#74a7f8;
  --head:"Space Grotesk","Segoe UI",sans-serif; --body:"Inter","Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1280px;height:720px;overflow:hidden;font-family:var(--body);color:var(--text);background:#000;}
#t{position:relative;width:1280px;height:720px;overflow:hidden;background:var(--bg);}
#t::before{content:"";position:absolute;inset:0;
  background:
    radial-gradient(900px 600px at 90% -10%, rgba(216,170,90,.22), transparent 60%),
    radial-gradient(700px 600px at -5% 110%, rgba(116,167,248,.14), transparent 55%),
    linear-gradient(180deg,#0b0d12,#090b10);}

/* capture de l'app, inclinée, sur la droite */
.shot{position:absolute;right:-70px;top:50%;width:760px;
  transform:translateY(-50%) perspective(1600px) rotateY(-16deg) rotateX(4deg);
  border:1px solid rgba(245,241,232,.18);border-radius:18px;overflow:hidden;
  box-shadow:0 60px 140px -30px rgba(0,0,0,.9);}
.shot .bar{display:flex;gap:8px;padding:13px 16px;background:#0d1019;border-bottom:1px solid rgba(245,241,232,.10);}
.shot .bar i{width:12px;height:12px;border-radius:50%;background:#2a3140;}
.shot .bar i:first-child{background:#e0a044;}
.shot img{width:100%;display:block;}
.shot::after{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(11,13,18,.85),transparent 42%);}

/* dégradé qui protège la lisibilité du texte à gauche */
.veil{position:absolute;inset:0;background:linear-gradient(90deg,rgba(11,13,18,.96) 34%,rgba(11,13,18,.4) 56%,transparent 72%);}

.content{position:absolute;left:64px;top:0;height:100%;width:720px;
  display:flex;flex-direction:column;justify-content:center;z-index:3;}

.brandrow{display:flex;align-items:center;gap:16px;margin-bottom:30px;}
.brandrow img{width:74px;height:74px;border-radius:18px;
  box-shadow:0 14px 40px -12px rgba(216,170,90,.6);}
.brandrow b{font-family:var(--head);font-weight:700;font-size:40px;letter-spacing:-.01em;}

h1{font-family:var(--head);font-weight:700;font-size:92px;line-height:.98;letter-spacing:-.025em;
  text-shadow:0 6px 30px rgba(0,0,0,.6);}
h1 .g{background:linear-gradient(120deg,var(--gold-light),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;}

.sub{font-size:30px;font-weight:600;color:var(--text-2);margin-top:22px;}

.row{display:flex;align-items:center;gap:18px;margin-top:34px;}
.badge{font-family:var(--head);font-weight:700;font-size:34px;color:#1a1206;
  background:linear-gradient(180deg,var(--gold-light),var(--gold));
  padding:14px 30px;border-radius:14px;box-shadow:0 16px 40px -12px rgba(216,170,90,.7);}
.chips{font-size:23px;font-weight:600;color:var(--text);opacity:.92;line-height:1.3;}
.chips span{color:var(--gold-light);}
</style>
</head>
<body>
<div id="t">
  <div class="shot">
    <div class="bar"><i></i><i></i><i></i></div>
    <img src="screenshots/01-app-main.png" alt="" />
  </div>
  <div class="veil"></div>

  <div class="content">
    <div class="brandrow">
      <img src="app-icon.png" alt="" />
      <b>Project-On</b>
    </div>
    <h1>Projetez<br>la <span class="g">Parole</span>.</h1>
    <div class="sub">Logiciel de projection pour églises</div>
    <div class="row">
      <div class="badge">100 % GRATUIT</div>
      <div class="chips">Bible · Cantiques<br><span>Prédications · OBS</span></div>
    </div>
  </div>
</div>
</body>
</html>
